name: "rabbit-mq-compose-file"

services:
  rabbitmq:
    image: rabbitmq:3.13.7-management-alpine
    container_name: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5  
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "8000:8000"
    command: npm run dev
    env_file: ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules 

  auth-service-pgadmin:
    image: dpage/pgadmin4:9.8
    ports:
      - 5051:80
    env_file: ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
    -  auth_service_pgadmin_data:/var/lib/pgadmin

  auth-service-database:
    image: postgres:16
    container_name: auth_postgres_db
    restart: always
    env_file: ./auth-service/.env
    ports:
      - "5431:5432"
    volumes:
      - auth_service_postgres_data:/var/lib/postgresql/data

  auth-service-backend:
    build:
      context: ./auth-service
      dockerfile: dockerfile
    ports:
      - "3001:3001"
    depends_on:
      rabbitmq:
        condition: service_healthy 
    command: sh -c "npm run build && npm run start:dev"
    env_file: ./auth-service/.env
    volumes:
      - ./auth-service:/app
      - /app/node_modules  

  mail-service-pgadmin:
    image: dpage/pgadmin4:9.8
    ports:
      - 5052:80
    env_file: ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
    -  mail_service_pgadmin_data:/var/lib/pgadmin

  mail-service-database:
    image: postgres:16
    container_name: mail_postgres_db
    restart: always
    env_file: ./mail-service/.env
    ports:
      - "5432:5432"
    volumes:
      - mail_service_postgres_data:/var/lib/postgresql/data

  mail-service-backend:
    build:
      context: ./mail-service
      dockerfile: dockerfile
    ports:
      - "3002:3002"
    depends_on:
      rabbitmq:
        condition: service_healthy 
    command: sh -c "npm run build && npm run start:dev"
    env_file: ./mail-service/.env
    volumes:
      - ./mail-service:/app
      - /app/node_modules  

volumes:
  auth_service_postgres_data: {}
  auth_service_pgadmin_data: {}
  mail_service_postgres_data: {}
  mail_service_pgadmin_data: {}