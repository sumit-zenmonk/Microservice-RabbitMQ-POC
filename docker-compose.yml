name: "rabbit-mq-compose-file"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5  
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}

  auth-service-pgadmin:
    image: dpage/pgadmin4:9.8
    ports:
      - 5050:80
    env_file: ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
    -  auth_service_pgadmin_data:/var/lib/pgadmin

  auth-service-database:
    image: postgres:16
    container_name: auth_postgres_db
    restart: always
    env_file: ./auth-service/.env
    ports:
      - "5433:5432"
    volumes:
      - auth_service_postgres_data:/var/lib/postgresql/data

  auth-service-backend:
    build:
      context: ./auth-service
      dockerfile: dockerfile
    ports:
      - "3001:3001"
    depends_on:
      rabbitmq:
        condition: service_healthy 
    command: sh -c "npm run build && npm run start:dev"
    env_file: ./auth-service/.env
    volumes:
      - ./auth-service:/app
      - /app/node_modules  

volumes:
  auth_service_postgres_data: {}
  auth_service_pgadmin_data: {}